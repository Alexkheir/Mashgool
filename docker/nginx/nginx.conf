# docker/nginx/nginx.conf — main config (http-level settings)
#
# Server blocks live in default.conf.template (mounted into
# /etc/nginx/templates/), which the official nginx image's entrypoint runs
# through envsubst — that's how ${DOMAIN} gets injected without editing files
# on the VPS.
#
# NOTE: no limit_req zones here — rate limiting is enforced by Express
# middleware, which is the project's single source of truth for limits
# (decision 2026-07-05). Duplicating limits in nginx would drift.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ─── LOGGING ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # ─── PERFORMANCE ───────────────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # ─── GZIP ──────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

  # Don't leak the nginx version in headers / error pages.
  server_tokens off;

  include /etc/nginx/conf.d/*.conf;
}
