# .github/workflows/deploy.yml — Test → Build → Push → Deploy
#
# - Pull requests into main: run the Test stage only (fast feedback, no images).
# - Push to main: full pipeline. Build & Push always run; Deploy only runs when
#   the repository variable DEPLOY_ENABLED is set to 'true', so the pipeline
#   stays green while no VPS exists yet.
# - Images are multi-arch (amd64 + arm64) because the target VPS may be an
#   Oracle Cloud Ampere (ARM64) instance.
# - Rollback: SSH to the VPS and re-run compose with IMAGE_TAG=<old sha>
#   (documented in docs/deployment.md).

name: Deploy Mashgool

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # One deploy at a time; don't cancel a running production deploy.
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:

  # ─── STAGE 1: TEST ───────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Audit dependencies
        run: npm audit --audit-level=high

  # ─── STAGE 2: BUILD + PUSH ───────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.TAG }}
      owner: ${{ steps.meta.outputs.OWNER }}

    steps:
      - uses: actions/checkout@v4

      # GHCR requires lowercase image names; the repo owner is "Alexkheir".
      - name: Compute image tag and owner
        id: meta
        run: |
          echo "TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # arm64 images are cross-built via QEMU emulation.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/mashgool-web:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/mashgool-web:${{ steps.meta.outputs.TAG }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/mashgool-api:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/mashgool-api:${{ steps.meta.outputs.TAG }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  # ─── STAGE 3: DEPLOY ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    # Repository variable — flip to 'true' once the VPS + secrets exist.
    if: vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # The compose file and nginx config are deployed from the repo on every
      # run — the repository stays the single source of truth for both.
      - name: Copy compose + nginx config to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/nginx/nginx.conf,docker/nginx/default.conf.template"
          target: /opt/mashgool/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Passed as environment variables to the remote script — avoids
          # interpolating secrets directly into shell text.
          envs: IMAGE_TAG,GHCR_OWNER,DOMAIN,POSTGRES_PASSWORD,GHCR_PULL_TOKEN
          script: |
            set -euo pipefail
            cd /opt/mashgool

            # Runtime configuration for docker-compose.prod.yml. POSTGRES_DB
            # and POSTGRES_USER are fixed names, not secrets.
            cat > .env.prod << EOF
            GHCR_OWNER=$GHCR_OWNER
            IMAGE_TAG=$IMAGE_TAG
            DOMAIN=$DOMAIN
            POSTGRES_DB=mashgool
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            EOF
            chmod 600 .env.prod

            # GITHUB_TOKEN is valid for the duration of this workflow run —
            # enough to pull the freshly pushed private images.
            echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            # TODO(Phase 1): run `npx prisma migrate deploy` here, between
            # pull and up, once the API has a Prisma schema.

            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-build

            docker image prune -f
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          GHCR_OWNER: ${{ needs.build.outputs.owner }}
          DOMAIN: ${{ vars.DOMAIN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GHCR_PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A deploy that leaves the site down should be a red ❌, not a green ✓.
      - name: Smoke check
        run: |
          sleep 15
          curl --fail --silent --show-error "https://${{ vars.DOMAIN }}/api/v1/health"
          curl --fail --silent --show-error --output /dev/null "https://${{ vars.DOMAIN }}/"
